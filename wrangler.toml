# Cloudflare Pages Konfiguration
# Deployment: `wrangler pages deploy ./dist` oder Git-Connect im Dashboard.
# Security-/CSP-Header liegen in public/_headers (Pages-Mechanismus für statische Header).
name = "website-speedtest"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Secrets (falls später benötigt) per CLI setzen, nie einchecken:
#   wrangler pages secret put API_KEY
