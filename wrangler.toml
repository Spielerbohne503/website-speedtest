# Cloudflare-Konfiguration: Worker mit statischen Assets.
# Deploy: `npx wrangler deploy` (Workers Builds führt das automatisch aus;
# der [build]-Block baut das Frontend vorher).
# Security-/CSP-Header liegen in public/_headers und landen via Vite in dist/.
name = "website-speedtest"
main = "worker/index.js"
compatibility_date = "2025-01-01"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Secrets (falls später benötigt) per CLI setzen, nie einchecken:
#   wrangler secret put API_KEY
