# Cloudflare-Konfiguration: Worker mit statischen Assets.
# Deploy: `npx wrangler deploy` (Workers Builds führt das automatisch aus;
# der [build]-Block baut das Frontend vorher).
# Security-/CSP-Header liegen in public/_headers und landen via Vite in dist/.
name = "ultimate-website-speedtester"
main = "worker/index.js"
compatibility_date = "2025-01-01"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# PageSpeed-Insights-Key (Test-Key, bewusst inline für Git-Deploy).
# Für Produktion besser als Secret setzen: wrangler secret put PSI_API_KEY
[vars]
PSI_API_KEY = "AIzaSyCijNQXk1OYlVVNEfiC5KoWeLuQ6PEm11A"
